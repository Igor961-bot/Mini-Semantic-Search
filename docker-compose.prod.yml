services:
  app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      ASI_CHROMA_PATH: /app/data/chroma
      ASI_LOG_PATH: /app/logs/app.log
